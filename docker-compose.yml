services:
  api:
    build: .
    env_file: .env
    ports:
      - "8200:8200"
    depends_on:
      - redis
    restart: unless-stopped

  worker:
    build: .
    env_file: .env
    command: ["arq", "src.workers.tasks.WorkerSettings"]
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  redis-data:
