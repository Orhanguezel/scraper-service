services:
  api:
    # Headless Chromium / Patchright: RAM + /dev/shm aynı ölçekte tutulur (OOM ve crash azaltır).
    shm_size: 2gb
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
    expose:
      - "8200"

  worker:
    shm_size: 2gb
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
    volumes:
      - crawl-checkpoints:/app/.scrapling

  redis:
    restart: unless-stopped
    ports: []

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/scraper.conf:/etc/nginx/conf.d/default.conf:ro
      - letsencrypt-certs:/etc/letsencrypt:ro
      - certbot-webroot:/var/www/certbot:ro
    restart: unless-stopped

volumes:
  crawl-checkpoints:
  letsencrypt-certs:
  certbot-webroot:
