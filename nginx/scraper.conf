server {
    listen 80;
    server_name scraper.guezelwebdesign.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name scraper.guezelwebdesign.com;

    ssl_certificate /etc/letsencrypt/live/scraper.guezelwebdesign.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/scraper.guezelwebdesign.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 2m;
    proxy_read_timeout 180s;
    proxy_connect_timeout 15s;
    proxy_send_timeout 180s;

    location / {
        proxy_pass http://api:8200;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
